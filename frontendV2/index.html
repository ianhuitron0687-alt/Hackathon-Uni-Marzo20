<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Titulacion FES Cuautitlan</title>

    <style>
        body {
            position: relative;
            overflow-x: hidden;
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #123c7a, #2a5298, #ffc400, #c27503);
            background-size: 300% 300%;
            animation: backgroundFlow 18s ease infinite;
            color: white;
            text-align: center;
            padding: 0 0 70px;
        }

        .topcard {
            position: relative;
            z-index: 2;
            width: 100%;
            box-sizing: border-box;
            background: linear-gradient(135deg, #ffc400, #c27503);
            border: 1px solid rgba(255, 255, 255, 0.7);
            padding: 24px 16px;
            margin: 0 0 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 18px;
        }

        .topcard h2 {
            margin: 0;
            color: white;
            font-size: 32px;
            font-weight: bold;
        }

        .topcard p {
            margin: 8px 0 0;
            color: white;
            font-size: 22px;
            font-weight: 600;
        }

        .topcard-logo {
            width: auto;
            height: 92px;
            flex-shrink: 0;
        }

        .topcard-text {
            text-align: center;
        }

        .logo {
            position: absolute;
            top: 140px;
            left: 50%;
            transform: translateX(-50%);
            width: 500px;
            max-width: 85%;
            z-index: 0;
            pointer-events: none;
            animation: logoShift 18s ease infinite;
        }

        .particles {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: var(--size, 10px);
            height: var(--size, 10px);
            background: rgba(255, 255, 255, 0.68);
            box-shadow: 0 0 12px rgba(255, 255, 255, 0.28);
            animation: bubbleUp var(--duration, 16s) linear infinite;
        }

        .particle:nth-child(1) { left: 8%; --size: 8px; --duration: 13s; animation-delay: -2s; }
        .particle:nth-child(2) { left: 18%; --size: 14px; --duration: 18s; animation-delay: -8s; }
        .particle:nth-child(3) { left: 29%; --size: 10px; --duration: 15s; animation-delay: -5s; }
        .particle:nth-child(4) { left: 42%; --size: 18px; --duration: 20s; animation-delay: -11s; }
        .particle:nth-child(5) { left: 56%; --size: 9px; --duration: 14s; animation-delay: -4s; }
        .particle:nth-child(6) { left: 68%; --size: 16px; --duration: 22s; animation-delay: -9s; }
        .particle:nth-child(7) { left: 81%; --size: 11px; --duration: 17s; animation-delay: -6s; }
        .particle:nth-child(8) { left: 91%; --size: 13px; --duration: 19s; animation-delay: -13s; }

        .card {
            position: relative;
            z-index: 2;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.7);
            padding: 60px;
            border-radius: 15px;
            display: inline-block;
            font-weight: bold;
        }

        .main-card {
            animation: fadeInCard 1s ease-out;
            padding-bottom: 110px;
        }

        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.55);
            display: none;
            z-index: 3;
        }

        .login-card {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 320px;
            max-width: calc(100% - 32px);
            background: rgba(255, 255, 255, 0.16);
            border: 1px solid rgba(255, 255, 255, 0.7);
            border-radius: 18px;
            padding: 28px;
            box-sizing: border-box;
            backdrop-filter: blur(10px);
            display: none;
            z-index: 4;
        }

        .login-card.visible {
            animation: fadeInLogin 0.45s ease-out;
        }

        .login-card h2 {
            margin-top: 0;
            margin-bottom: 20px;
        }

        .login-card label {
            display: block;
            text-align: left;
            margin-bottom: 6px;
            font-weight: bold;
        }

        .login-card input,
        .login-card select {
            width: 100%;
            box-sizing: border-box;
            padding: 12px;
            margin-bottom: 16px;
            border: none;
            border-radius: 10px;
        }

        .login-card .close-btn {
            margin-left: 12px;
            background: rgba(255, 255, 255, 0.35);
        }

        .error-card {
            display: none;
            margin-top: 16px;
            padding: 14px 16px;
            border-radius: 12px;
            background: rgba(255, 94, 94, 0.2);
            border: 1px solid rgba(255, 160, 160, 0.5);
            color: #ffe5e5;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #ffc400, #c27503);
            color: black;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s ease, transform 0.3s ease;
        }

        button:hover {
            background: #00ffcc;
        }

        .main-card button {
            position: absolute;
            left: 50%;
            bottom: 45px;
            transform: translateX(-50%);
            margin: 0;
        }

        @keyframes fadeInCard {
            from {
                opacity: 0;
                transform: translateY(24px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInLogin {
            from {
                opacity: 0;
                transform: translate(-50%, -46%);
            }
            to {
                opacity: 1;
                transform: translate(-50%, -50%);
            }
        }

        @keyframes backgroundFlow {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }

        @keyframes logoShift {
            0% {
                opacity: 0.4;
                filter: sepia(1) saturate(4) hue-rotate(350deg) brightness(1.05);
            }
            50% {
                opacity: 0.52;
                filter: sepia(1) saturate(6) hue-rotate(150deg) brightness(0.55) contrast(1.15);
            }
            100% {
                opacity: 0.4;
                filter: sepia(1) saturate(4) hue-rotate(350deg) brightness(1.05);
            }
        }

        @keyframes bubbleUp {
            0% {
                transform: translateY(110vh) translateX(0) rotate(0deg);
                opacity: 0;
            }
            15% {
                opacity: 0.62;
            }
            100% {
                transform: translateY(-20vh) translateX(18px) rotate(220deg);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <div class="particles">
        <span class="particle"></span>
        <span class="particle"></span>
        <span class="particle"></span>
        <span class="particle"></span>
        <span class="particle"></span>
        <span class="particle"></span>
        <span class="particle"></span>
        <span class="particle"></span>
    </div>

    <div class="topcard">
        <img src="unam-chiquito.png" alt="Logo UNAM pequeno" class="topcard-logo">
        <div class="topcard-text">
            <h2>Universidad Nacional Autonoma de Mexico</h2>
            <p>Facultad de Estudios Superiores Cuautitlan</p>
        </div>
        <img src="https://raw.githubusercontent.com/ianhuitron0687-alt/Hackathon-Uni-Marzo20/refs/heads/main/frontendV2/logfes.png" alt="Logo FES" class="topcard-logo">
    </div>

    <img src="unam-main.png" alt="Logo UNAM" class="logo">

    <div class="card main-card">
        <h1>Plataforma integral de titulacion</h1>
        <p>Sistema de titulacion universitaria</p>
        <p>Facultad de Estudios Superiores Cuautitlan</p>
        <button onclick="abrirLogin()">Iniciar sesión</button>
        <p id="mensaje"></p>
    </div>

    <div class="overlay" id="overlay" onclick="cerrarLogin()"></div>

    <div class="login-card" id="loginCard">
        <h2>Iniciar sesion</h2>

        <label for="matricula">Matricula</label>
        <input type="text" id="matricula" name="matricula" placeholder="Ingresa tu matricula">

        <label for="contrasena">Contrasena</label>
        <input type="password" id="contrasena" name="contrasena" placeholder="Ingresa tu contrasena">

        <label for="opcion-titulacion">Opcion de titulacion</label>
        <select id="opcion-titulacion" name="opcion-titulacion">
            <option value="">Selecciona una opcion</option>
            <option value="opcion-1">Opcion 1</option>
            <option value="opcion-2">Opcion 2</option>
            <option value="opcion-3">Opcion 3</option>
        </select>

        <button type="button" onclick="validarLogin()">Entrar</button>
        <button type="button" class="close-btn" onclick="cerrarLogin()">Cerrar</button>
        <div class="error-card" id="errorCard">matricula o contrasena incorrectas</div>
    </div>

    <script>
        function abrirLogin() {
            const loginCard = document.getElementById("loginCard");

            document.getElementById("overlay").style.display = "block";
            loginCard.classList.remove("visible");
            loginCard.style.display = "block";
            void loginCard.offsetWidth;
            loginCard.classList.add("visible");
            document.getElementById("mensaje").innerText = "";
            document.getElementById("errorCard").style.display = "none";
        }

        function cerrarLogin() {
            document.getElementById("overlay").style.display = "none";
            document.getElementById("loginCard").style.display = "none";
            document.getElementById("loginCard").classList.remove("visible");
            document.getElementById("errorCard").style.display = "none";
        }

        function validarLogin() {
            const matricula = document.getElementById("matricula").value.trim();
            const contrasena = document.getElementById("contrasena").value.trim();
            const errorCard = document.getElementById("errorCard");

           if (matricula === "323332855" && contrasena === "24092007") {
            // REDIRECCIÓN CORREGIDA CON LA RUTA DE LA CARPETA
            window.location.href = "frontendV2/chart.html"; 
            return;
        }

        errorCard.style.display = "block";
    }
</script>
</body>
</html>
